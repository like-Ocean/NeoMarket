services:
  # ── Database ──────────────────────────────────────────────
  postgresql:
    env_file: .env
    image: postgres:latest
    container_name: "database"
    restart: always
    networks: [internal-net]
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./postgres_data:/var/lib/postgresql

    ports:
      - "${DB_PORT}:5432"

  # ── App ───────────────────────────────────────────────────
  fastapi:
    build: .
    container_name: app
    env_file: .env
    ports:
      - "${APP_PORT}:4000"
    environment:
      DB_HOST: postgresql
    depends_on:
      - postgresql
    restart: unless-stopped

volumes:
  postgres_data:
